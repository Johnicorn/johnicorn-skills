# 2b minimal-pairs collection — the NATIVE gating input for the §12 parser spike.
# Fill-in template for Jānis. The spike CANNOT run before this file is complete
# (≥ 50 native-validated pairs PER family) — see docs/2026-07-15-lv-antislop-v2-design.md §12.
#
# WHAT IS A MINIMAL PAIR HERE
#   One sentence in two variants that differ in EXACTLY ONE morphological feature
#   on the dependent word: the grammatical variant + the ungrammatical variant.
#   The violation site must be unambiguous (one token), the rest of the sentence
#   identical and error-free, natural word order, no rare vocabulary.
#
# PER-PAIR CHECKLIST (all must hold before status: validated)
#   1. Exactly one feature differs (Case | Number | Gender | Person).
#   2. The bad variant is truly UNGRAMMATICAL for a native (not merely stilted).
#   3. No other typo/agreement issue anywhere in either variant.
#   4. flag_token = the surface token a correct checker should flag in `bad`.
#   5. syncretism trap checked: the bad form must not have an alternative valid
#      reading in this exact sentence (if it does -> tag phenomenon: syncretism
#      and describe the second reading in notes, or rewrite the sentence).
#
# FAMILY DEFINITIONS (from design §5 "Agreement (2b, gated)")
#   amod : head = NOUN, dependent = ADJ (or participle -> VerbForm-aware);
#          features: Case / Number / Gender where present.
#   nsubj: subject–verb; features: Person / Number ONLY where the finite verb
#          form overtly marks them (LV 3rd person does NOT mark sg/pl on most
#          verbs -> those are abstain cases, NOT violations; see EX-N3).
#
# PHENOMENON QUOTA (so coverage/abstention ≥ thresholds mean something):
#   aim ≈ 30 plain + ≥ 4 each of: coordination, indeclinable, numeral,
#   syncretism, ellipsis, participle(amod)/reflexive(nsubj) per family.
#
# STATUS VALUES:  todo -> drafted -> validated   (only `validated` counts toward 50)
# `example: true` entries are worked demonstrations — they do NOT count.
#
# DRAFT PROVENANCE (2026-07-16): A-01..A-50 / N-01..N-50 melnrakstus sagatavoja
# Claude pēc Jāņa lūguma (status: drafted). Uz 50 skaitās TIKAI pēc Jāņa pārskata
# (native-validated, §12) — katrs teikums jāpārlasa un jālabo; arī gramatiski
# pareizs, bet neidiomātisks kalks ir jālabo (sk. EX-N4 labojumu). Refleksīvie
# nsubj pāri ir plain kvotā ar piezīmi (enum vērtības reflexive nav).
#
# Protocol freeze: when both families reach >= 50 validated, this file is
# frozen + SHA-256-hashed BEFORE the spike runs (§12). Do not edit after freeze.

